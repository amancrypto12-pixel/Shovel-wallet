<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shovel Wallet — Mining & Swap DEX</title>
  <link rel="icon" type="image/png" href="/shovel_logo.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Telegram WebApp SDK Simulation / Polyfill -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="dark-theme">
  <!-- Interactive Canvas Background -->
  <canvas id="bg-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>

  <!-- Telegram Mini App Wrapper -->
  <div id="app-container" class="tg-app">
    <!-- Header injected by Header.js -->
    <header id="app-header" class="app-header"></header>

    <!-- Main Viewport Router -->
    <main id="app-viewport" class="app-viewport"></main>

    <!-- Bottom Navigation Bar injected by Navigation.js -->
    <nav id="app-nav" class="app-nav"></nav>

    <!-- Global Modal Overlay Container -->
    <div id="modal-container" class="modal-container hidden"></div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
